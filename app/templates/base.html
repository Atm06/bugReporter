<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bug Bash{% endblock %} | Catalog Bug Bash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a5f',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="h-full bg-gray-50 text-gray-900">

<nav class="bg-brand-900 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-bold tracking-tight">Bug Bash</span>
                <span class="hidden sm:inline text-sm bg-brand-700 rounded-full px-3 py-0.5 font-medium">Catalog</span>
            </div>
            <div class="flex items-center gap-1 sm:gap-2">
                <a href="/" class="nav-link {% block nav_submit %}{% endblock %}">Report Bug</a>
                <a href="/dashboard" class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a>
                <a href="/leaderboard" class="nav-link {% block nav_leaderboard %}{% endblock %}">Leaderboard</a>
                <span class="hidden sm:inline text-white/30 mx-1">|</span>
                <!-- User session area -->
                <div id="user-bar-logged-out">
                    <button onclick="openLoginModal()" class="nav-link text-yellow-300 hover:text-yellow-100">Sign In</button>
                </div>
                <div id="user-bar-logged-in" class="hidden flex items-center gap-2">
                    <span id="user-bar-name" class="text-sm text-white/80 hidden sm:inline truncate max-w-[120px]"></span>
                    <span id="admin-badge" class="hidden text-[10px] bg-yellow-500 text-yellow-900 font-bold rounded px-1.5 py-0.5 uppercase">Admin</span>
                    <button onclick="logoutUser()" class="text-white/50 hover:text-white transition-colors text-xs" title="Sign out">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
</main>

<div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

<!-- Login Modal -->
<div id="login-modal" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm" onclick="event.stopPropagation()">
            <div class="px-6 py-5 border-b border-gray-200">
                <h2 class="text-lg font-bold text-gray-900">Welcome to Bug Bash</h2>
                <p class="text-sm text-gray-500 mt-1">Enter your name and email to get started.</p>
            </div>
            <form id="login-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="login-name" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Jane Smith">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Work Email</label>
                    <input type="email" id="login-email" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder="jane@company.com">
                </div>
                <div id="login-password-group" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Admin Password</label>
                    <input type="password" id="login-password" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Enter admin password">
                    <p class="text-xs text-amber-600 mt-1">This email is registered as admin. Please enter the password.</p>
                </div>
                <button type="submit" id="login-submit-btn" class="w-full py-2.5 bg-brand-600 text-white rounded-lg font-medium text-sm hover:bg-brand-700 transition-colors disabled:opacity-50">Continue</button>
            </form>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
